<!DOCTYPE html>
<html lang="PT-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP | My Project</title>
    <style>
        /* Configuração Global */
        body {
            background-color: lightgray;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ocupa a altura total, mas permite scroll se crescer */
            padding: 20px; /* Margem de segurança para telemóveis */
            box-sizing: border-box;
        }

        /* Container Adaptável */
        .conteiner {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            
            /* ESSENCIAL PARA PC E CELULAR: */
            width: 100%;       /* Ocupa a largura disponível no telemóvel */
            max-width: 500px;  /* No PC, não passa desta largura */
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }

        /* Lista de Projetos */
        ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin: 12px 0;
        }

        li a {
            display: block;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }

        /* Hover no PC */
        li a:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        /* Botão de Voltar */
        .back-btn {
            display: block;
            width: 100%;
            margin-top: 25px;
            background-color: transparent;
            color: #555;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #555;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #333;
            color: white;
            border-color: #333;
        }

        /* Ajustes específicos para ecrãs muito pequenos */
        @media (max-width: 400px) {
            .conteiner {
                padding: 20px;
            }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="conteiner">
        <h1>My Projects</h1>
        <ol>
            <li><a href="project1.html">Project 1</a></li>
            <li><a href="project2.html">Project 2</a></li>
            <li><a href="project3.html">Project 3</a></li>
            <li><a href="project4.html">Project 4</a></li>
            <li><a href="project5.html">Project 5</a></li>
        </ol>
        
        <a href="index.html" style="text-decoration: none;">
            <button class="back-btn">Back</button>
        </a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="PT-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Generator</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e64a19;
        }

        #colorDisplay {
            margin-top: 20px;
            height: 100px;
            border-radius: 10px;
            line-height: 100px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .back-btn {
            display: block;
            margin: 20px auto 0;
            background-color: white;
            color: black;
            border: 1px solid black;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Random Color Generator</h1>
        <button id="generateBtn">Generate Color</button>
        <div id="colorDisplay">#FFFFFF</div>
        <a class="back-btn" href="index02.html">Back to Projects</a>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const colorDisplay = document.getElementById('colorDisplay');

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for(let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        generateBtn.addEventListener('click', () => {
            const newColor = getRandomColor();
            colorDisplay.style.backgroundColor = newColor;
            colorDisplay.innerText = newColor;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="PT-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #quoteDisplay {
            margin-top: 20px;
            font-style: italic;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin: 20px 5px 0;
            background-color: white;
            color: black;
            border: 1px solid black;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Random Quote Generator</h1>
        <button id="generateBtn">Generate Quote</button>
        <div id="quoteDisplay">Click the button to get a quote!</div>
        <div>
            <a class="back-btn" href="index02.html">Back to Projects</a>
            <a class="back-btn" href="index.html">Back to Home</a>
        </div>
    </div>

    <script>
        const quotes = [
            "Programming is like solving a puzzle.",
            "Practice makes perfect in coding.",
            "Debugging is like being a detective in a crime movie.",
            "Learning JavaScript is fun and powerful!",
            "Every great programmer was once a beginner."
        ];

        const generateBtn = document.getElementById('generateBtn');
        const quoteDisplay = document.getElementById('quoteDisplay');

        generateBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteDisplay.innerText = quotes[randomIndex];
        });
    </script>
</body>
</html>
